[build]
	command = "pnpm run build"
	publish = "build"

[dev]
  command = "pnpm run dev"
  targetPort = 5173
  framework = "#custom"
  autoLaunch = false
 
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"